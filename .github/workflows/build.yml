name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate shell scripts
        run: |
          bash -n build.sh
          bash -n scripts/build-openwrt-sdk.sh
          sh -n package/trafix/files/etc/init.d/trafix
          sh -n package/trafix/files/usr/bin/trafix
          sh -n package/trafix/files/usr/bin/trafix2dnsmasq.sh
          python3 -m py_compile scripts/build-openwrt-feed.py

  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - id: matrix
        name: Load build matrix
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open('.github/openwrt-sdk-matrix.json') as f:
              data = json.load(f)
          print('matrix=' + json.dumps(data, separators=(',', ":")))
          PY

  build:
    needs:
      - lint
      - prepare-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk libncurses5-dev libncursesw5-dev file rsync unzip wget zlib1g-dev python3-distutils

      - name: Build package
        env:
          SDK_URL: ${{ matrix.sdk_url }}
          ARTIFACT_DIR: ${{ github.workspace }}/dist/${{ matrix.name }}
        run: ./build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}/*
          if-no-files-found: error

  publish_feed:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install feed dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: feed-artifacts
          merge-multiple: false

      - name: Build feed index
        run: |
          python3 scripts/build-openwrt-feed.py \
            --artifacts-dir feed-artifacts \
            --output-dir site
          find site -maxdepth 2 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
