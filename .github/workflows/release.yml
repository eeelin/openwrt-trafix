name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - id: matrix
        name: Load build matrix
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open('.github/openwrt-sdk-matrix.json') as f:
              data = json.load(f)
          print('matrix=' + json.dumps(data, separators=(',', ":")))
          PY

  build:
    needs: prepare-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk libncurses5-dev libncursesw5-dev file rsync unzip wget zlib1g-dev python3-distutils

      - name: Build package
        env:
          SDK_URL: ${{ matrix.sdk_url }}
          ARTIFACT_DIR: ${{ github.workspace }}/dist/${{ matrix.name }}
        run: ./build.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          while IFS= read -r file; do
            target=$(basename "$(dirname "$file")")
            base=$(basename "$file")
            cp "$file" "release-files/${target}-${base}"
          done < <(find release-artifacts -type f \( -name '*.ipk' -o -name 'sha256sums.txt' \) | sort)
          ls -lah release-files

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: release-files/*
          generate_release_notes: true
